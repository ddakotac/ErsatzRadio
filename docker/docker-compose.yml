services:
    ersatztv:
        build:
            context: ..
            dockerfile: docker/Dockerfile
            args:
                INFO_VERSION: "docker-compose-develop"
        environment:
            TZ: America/Chicago
        ports:
            - "8499:8409"
        volumes:
            - ersatztv:/config
            - /mnt/dildakicon:/media/shared:ro
        tmpfs:
            - /transcode
volumes:
    ersatztv:
